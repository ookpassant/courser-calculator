# Apache config for serving the breeding calculator at ook.monster/courser-calc
#
# Drop these directives INSIDE your existing ook.monster <VirtualHost> block
# (the HTTPS one on :443, and the :80 one too if it isn't just redirecting to
# HTTPS). Then reload Apache:  sudo systemctl reload apache2   (or httpd)
#
# Assumes the git clone lives at /var/www/courser-calc. Change both paths
# below if you put it somewhere else.

# Map the URL path to the clone directory.
Alias /courser-calc /var/www/courser-calc

# Add the trailing slash so relative asset paths (breeding-calculator.js)
# resolve correctly.
RedirectMatch ^/courser-calc$ /courser-calc/

<Directory /var/www/courser-calc>
    Require all granted
    Options -Indexes +FollowSymLinks
    DirectoryIndex index.html
</Directory>

# Never expose the git metadata over the web.
<DirectoryMatch "^/var/www/courser-calc/\.git">
    Require all denied
</DirectoryMatch>
