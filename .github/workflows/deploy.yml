name: Deploy to VPS

# Auto-deploys the site to the VPS on every push to main.
# The VPS keeps a git clone; this workflow SSHes in and fast-forwards it
# to the latest main, so "updating via git" stays literally true.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   VPS_HOST         - server hostname or IP (e.g. ook.monster)
#   VPS_USER         - ssh user that owns the clone on the server
#   VPS_SSH_KEY      - private SSH key (PEM) whose public half is in that
#                      user's ~/.ssh/authorized_keys on the VPS
# Optional secrets:
#   VPS_PORT         - ssh port (defaults to 22)
#   VPS_DEPLOY_PATH  - path to the clone on the VPS (defaults to /var/www/courser-calc)

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets you trigger a deploy by hand from the Actions tab

concurrency:
  group: deploy-vps
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH (git pull on the server)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.VPS_DEPLOY_PATH || '/var/www/courser-calc' }}"
            cd "$DEPLOY_PATH"
            git fetch --prune origin
            git reset --hard origin/main
            echo "Deployed $(git rev-parse --short HEAD) - $(git log -1 --pretty=%s)"
